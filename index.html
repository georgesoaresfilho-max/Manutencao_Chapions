<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manutenção Champions — Makro Engenharia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1229;color:#fff;font-family:Arial,sans-serif;min-height:100vh}
.hidden{display:none!important}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0A1F5C 0%,#0D1229 60%)}
.login-box{background:rgba(13,26,64,.95);border:1px solid rgba(232,0,28,.4);border-radius:16px;padding:44px 38px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.login-logo{text-align:center;margin-bottom:28px}
.xmark{font-size:52px;color:#E8001C;display:block;line-height:1;margin-bottom:8px}
.login-logo h1{font-size:26px;font-weight:900;letter-spacing:3px}
.login-logo h1 span{color:#E8001C}
.login-logo p{font-size:12px;color:#8A94B0;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.form-label{display:block;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A94B0;margin-bottom:8px}
.form-input{width:100%;padding:13px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:15px;margin-bottom:18px;-webkit-appearance:auto;appearance:auto}
.form-input option{background:#0A1F5C;color:#fff;padding:8px}
.form-input:focus{outline:none;border-color:#E8001C}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#E8001C,#B0001A);border:none;border-radius:8px;color:#fff;font-size:18px;font-weight:900;letter-spacing:3px;cursor:pointer}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:#E8001C;font-size:13px;text-align:center;margin-bottom:12px;display:none}
.login-hint{color:#4A5278;font-size:11px;text-align:center;margin-top:14px}
.login-hint strong{color:#8A94B0}
#app-screen{display:none;min-height:100vh}
.header{background:rgba(10,31,92,.97);border-bottom:2px solid #E8001C;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100}
.h-logo{display:flex;align-items:center;gap:12px}
.h-logo .xi{width:34px;height:34px;background:#E8001C;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900}
.h-logo span{font-size:18px;font-weight:900;letter-spacing:2px}
.h-logo span em{color:#E8001C;font-style:normal}
.h-nav{display:flex;gap:2px}
.nav-btn{padding:8px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:#8A94B0;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.nav-btn.active{color:#E8001C;border-bottom-color:#E8001C}
.nav-btn:hover{color:#fff}
.h-right{display:flex;align-items:center;gap:12px}
.role-badge{background:rgba(232,0,28,.15);border:1px solid rgba(232,0,28,.3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;color:#E8001C;letter-spacing:1px}
.btn-sair{padding:7px 14px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#8A94B0;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}
.btn-sair:hover{border-color:#E8001C;color:#E8001C}
.content{padding:28px 24px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.page-title{font-size:30px;font-weight:900;letter-spacing:3px;margin-bottom:6px}
.page-title span{color:#E8001C}
.page-sub{color:#8A94B0;font-size:13px;margin-bottom:24px}
.card{background:rgba(13,26,64,.7);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:22px;margin-bottom:18px}
.card-title{font-size:17px;font-weight:900;letter-spacing:2px;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat-card{background:rgba(13,26,64,.7);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px 22px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.red::before{background:#E8001C}.stat-card.blue::before{background:#1A3A9C}
.stat-card.gold::before{background:#FFD700}.stat-card.green::before{background:#00E676}
.stat-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8A94B0;margin-bottom:8px}
.stat-val{font-size:38px;font-weight:900;line-height:1;margin-bottom:4px;font-family:monospace}
.stat-card.red .stat-val{color:#E8001C}.stat-card.gold .stat-val{color:#FFD700}.stat-card.green .stat-val{color:#00E676}
.stat-meta{font-size:13px;color:#8A94B0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px}
.prog-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:8px}
.prog-track{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#1A3A9C,#E8001C)}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;padding:18px 0 22px}
.pod-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.pod-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900}
.pod-av.gold{background:rgba(255,215,0,.15);border:2px solid #FFD700;color:#FFD700}
.pod-av.silver{background:rgba(192,200,216,.15);border:2px solid #C0C8D8;color:#C0C8D8}
.pod-av.bronze{background:rgba(205,127,50,.15);border:2px solid #CD7F32;color:#CD7F32}
.pod-name{font-size:12px;font-weight:700;text-align:center;max-width:72px}
.pod-pts{font-size:11px;color:#8A94B0;font-family:monospace}
.pod-bar{width:66px;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900}
.pod-bar.gold{height:110px;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:#FFD700}
.pod-bar.silver{height:82px;background:rgba(192,200,216,.1);border:1px solid rgba(192,200,216,.2);color:#C0C8D8}
.pod-bar.bronze{height:58px;background:rgba(205,127,50,.1);border:1px solid rgba(205,127,50,.2);color:#CD7F32}
.rtable{width:100%;border-collapse:collapse}
.rtable th{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8A94B0;padding:9px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08)}
.rtable td{padding:12px;font-size:14px;border-bottom:1px solid rgba(255,255,255,.04)}
.r-pos{font-size:20px;font-weight:900;font-family:monospace;width:36px}
.r-pos.t1{color:#FFD700}.r-pos.t2{color:#C0C8D8}.r-pos.t3{color:#CD7F32}.r-pos.tx{color:#4A5278}
.r-name{font-weight:700}.r-pts{font-family:monospace;font-weight:700;color:#E8001C}
.d-item{display:flex;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;gap:10px;margin-bottom:7px}
.d-icon{font-size:16px;flex-shrink:0}.d-info{flex:1}
.d-name{font-weight:700;font-size:14px;margin-bottom:2px}
.d-meta{font-size:11px;color:#8A94B0}
.d-pts{font-family:monospace;font-size:13px;color:#E8001C;font-weight:700;flex-shrink:0}
.btn-entregar{padding:7px 12px;background:#E8001C;border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.btn-entregar:hover{background:#B0001A}
.btn-reenviar{padding:7px 12px;background:rgba(255,214,0,.15);border:1px solid rgba(255,214,0,.4);border-radius:6px;color:#FFD600;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.barchart{display:flex;align-items:flex-end;gap:8px;height:110px;margin-top:10px}
.bc-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bc-fill{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,#E8001C,rgba(232,0,28,.3));min-height:3px}
.bc-label{font-size:9px;color:#8A94B0;text-align:center}
.bc-val{font-size:10px;color:#E8001C;font-family:monospace}
.alert-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:6px}
.alert-item.err{background:rgba(232,0,28,.08);border:1px solid rgba(232,0,28,.2)}
.alert-item.warn{background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.2)}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px}
.badge.earned{background:rgba(232,0,28,.15);border:1px solid rgba(232,0,28,.4);color:#E8001C}
.badge.locked{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#4A5278}
.ctable{width:100%;border-collapse:collapse;font-size:12px}
.ctable th{padding:9px 10px;background:rgba(10,31,92,.5);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#8A94B0;text-align:center}
.ctable th:first-child{text-align:left}
.ctable td{padding:10px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.ctable td:first-child{text-align:left;font-weight:700;font-size:12px}
.h-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.h-name{font-weight:700;font-size:13px}.h-meta{color:#8A94B0;font-size:11px}
.h-pts{font-family:monospace;font-weight:700;color:#00E676}
.h-pts.neg{color:#E8001C}
.filter-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.filter-row select{padding:9px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:13px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#1E2440;border:1px solid rgba(232,0,28,.3);border-radius:16px;padding:30px;width:100%;max-width:460px}
.modal-title{font-size:20px;font-weight:900;letter-spacing:2px;margin-bottom:6px}
.modal-desc{color:#8A94B0;font-size:13px;margin-bottom:16px}
.upload-area{border:2px dashed rgba(232,0,28,.35);border-radius:10px;padding:28px;text-align:center;cursor:pointer;margin-bottom:16px;position:relative}
.upload-area:hover{border-color:#E8001C;background:rgba(232,0,28,.05)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-txt{font-size:13px;color:#8A94B0}
.upload-txt strong{color:#E8001C}
.upload-prev{display:none;margin-bottom:16px;background:rgba(0,230,118,.05);border:1px solid rgba(0,230,118,.2);border-radius:8px;padding:11px 14px;font-size:13px;color:#00E676;align-items:center;gap:7px}
.upload-prev.show{display:flex}
.rej-note{background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#FFD600;margin-bottom:14px;display:none}
.modal-btns{display:flex;gap:10px}
.btn-cancel{flex:1;padding:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#8A94B0;font-size:14px;font-weight:700;cursor:pointer}
.btn-confirm{flex:2;padding:13px;background:linear-gradient(135deg,#E8001C,#B0001A);border:none;border-radius:8px;color:#fff;font-size:17px;font-weight:900;letter-spacing:2px;cursor:pointer}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}
.btn-reprovar{padding:7px 14px;background:rgba(232,0,28,.1);border:1px solid rgba(232,0,28,.3);border-radius:6px;color:#E8001C;font-size:12px;font-weight:700;cursor:pointer}
.audit-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:15px;margin-bottom:9px}
.audit-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.audit-name{font-weight:700;font-size:14px}.audit-who{font-size:12px;color:#8A94B0}
.audit-evid{display:flex;align-items:center;gap:7px;padding:8px 11px;background:rgba(10,31,92,.5);border-radius:6px;font-size:12px;color:#8A94B0;margin-bottom:9px}
.audit-evid a{color:#4A90E2;text-decoration:none;font-weight:700}
.audit-evid a:hover{text-decoration:underline}
.tag-ok{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(0,230,118,.15);color:#00E676}
.toast{position:fixed;top:24px;right:24px;border-radius:12px;padding:14px 22px;font-weight:700;font-size:15px;z-index:9999;display:none}
.toast.show{display:block}
.toast.success{background:rgba(0,230,118,.15);border:1px solid #00E676;color:#00E676}
.toast.error{background:rgba(232,0,28,.15);border:1px solid #E8001C;color:#E8001C}
.loading{text-align:center;padding:40px;color:#8A94B0;font-size:14px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:#E8001C;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.g2,.g3,.stats-grid{grid-template-columns:1fr}}
</style>
</head>

// ── HELPERS ──
function wkS(d){var dt=new Date(d);dt.setDate(dt.getDate()-dt.getDay());dt.setHours(0,0,0,0);return dt;}
function moS(d){var dt=new Date(d);dt.setDate(1);dt.setHours(0,0,0,0);return dt;}
function yrS(d){var dt=new Date(d);dt.setMonth(0,1);dt.setHours(0,0,0,0);return dt;}

function ptsFor(uid, period) {
  var now = new Date();
  var start = period==="week"?wkS(now):period==="month"?moS(now):yrS(now);
  var total = 0;
  ALL_RECS.forEach(function(r){
    if(r.usuario_id===uid && r.status!=="rejected" && new Date(r.data)>=start) total+=r.pontos;
  });
  return total;
}

function getRank(period) {
  return PLANNERS.map(function(uid){return{uid:uid,name:USERS[uid].name,pts:ptsFor(uid,period)};}).sort(function(a,b){return b.pts-a.pts;});
}

function getStatus(uid, did) {
  var rs = ALL_RECS.filter(function(r){return r.usuario_id===uid&&r.entrega_id===did;});
  if(!rs.length) return "none";
  return rs.sort(function(a,b){return new Date(b.data)-new Date(a.data);})[0].status;
}

function getLatest(uid, did) {
  var rs = ALL_RECS.filter(function(r){return r.usuario_id===uid&&r.entrega_id===did;});
  if(!rs.length) return null;
  return rs.sort(function(a,b){return new Date(b.data)-new Date(a.data);})[0];
}

function pctDone(uid) {
  var done = DELS.filter(function(d){var s=getStatus(uid,d.id);return s==="ok"||s==="audited";}).length;
  return Math.round(done/DELS.length*100);
}

function getStreak(uid) {
  var s=0,now=new Date();
  for(var w=0;w<12;w++){
    var ws=wkS(new Date(now.getTime()-w*7*864e5)),we=new Date(ws.getTime()+7*864e5);
    var wdels=DELS.filter(function(d){return d.freq==="semanal";});
    var done={};
    ALL_RECS.forEach(function(r){if(r.usuario_id===uid&&r.status!=="rejected"&&new Date(r.data)>=ws&&new Date(r.data)<we)done[r.entrega_id]=true;});
    if(wdels.every(function(d){return done[d.id];}))s++;else break;
  }
  return s;
}

function ini(n){return n.split(" ").map(function(x){return x[0];}).join("").slice(0,2);}
function first(n){return n.split(" ")[0];}
function sicon(s){return s==="ok"||s==="audited"?"✅":s==="rejected"?"⚠️":"❌";}
function slabel(s){return s==="ok"?"Entregue":s==="audited"?"Auditado":s==="rejected"?"Reprovada — Reenviar":"Pendente";}
function fmt(iso){return new Date(iso).toLocaleDateString("pt-BR");}

function toast(msg, type) {
  var t=document.getElementById("toast");
  t.textContent=msg; t.className="toast "+(type||"success")+" show";
  setTimeout(function(){t.classList.remove("show");},3000);
}

function fileUrl(path) {

async function doLogin() {
  var uid = document.getElementById("sel-user").value;

  err.style.display="none";
  if(!uid){err.textContent="Selecione um usuário.";err.style.display="block";return;}
  if(!pw){err.textContent="Digite sua senha.";err.style.display="block";return;}

  // Valida senha localmente
  if(!USERS[uid]||USERS[uid].pw!==pw){
    err.textContent="Senha incorreta.";err.style.display="block";return;
  }

  var btn = document.getElementById("btn-login");
  btn.disabled=true; btn.textContent="Carregando...";

  try {
    CU=uid;
    document.getElementById("login-screen").style.display="none";

    await loadRecs();

  } catch(e) {
    err.textContent="Erro de conexão. Verifique sua internet.";err.style.display="block";
    btn.disabled=false;btn.textContent="ENTRAR";
  }

        '<span class="tag-ok">ENTREGUE</span></div>'+
        '<div class="audit-evid">📎 <a href="'+url+'" target="_blank">'+r.arquivo_nome+'</a></div>'+
        '<button class="btn-reprovar" onclick="openAudit(\''+r.usuario_id+'\',\''+r.id+'\',\''+((DMAP[r.entrega_id]?DMAP[r.entrega_id].name:"")||"").replace(/\'/g,"")+'\',\''+r.arquivo_nome+'\',\''+(USERS[r.usuario_id]?USERS[r.usuario_id].name:"")+'\',\''+url+'\')">🚫 REPROVAR</button>'+
      '</div>';
    }).join("")+
    '</div></div>'+
    '<div class="tab-panel" id="tp4">'+
    '<div class="page-title">HISTÓRICO <span>COMPLETO</span></div>'+
    '<div class="page-sub">Todas as entregas do time</div>'+
    '<div class="card">'+
    allRecs.map(function(r){return'<div class="h-item"><div><div class="h-name">'+(DMAP[r.entrega_id]?DMAP[r.entrega_id].name:r.entrega_id)+'</div><div class="h-meta">'+(USERS[r.usuario_id]?USERS[r.usuario_id].name:r.usuario_id)+' · <a href="'+fileUrl(r.arquivo_path||"")+'" target="_blank" style="color:#4A90E2">📎 '+r.arquivo_nome+'</a> · '+fmt(r.data)+'</div></div><div class="h-pts'+(r.status==="rejected"?" neg":"")+'">'+( r.status==="rejected"?"−":"+")+ r.pontos+'</div></div>';}).join("")+
    '</div></div>';
}

function podiumHTML(rank){
  function pi(u,medal,h,clr){
    if(!u)return"";
    var usr=USERS[u.uid]||{};
    var lbl=usr.filial||u.name;
    return'<div class="pod-item"><div class="pod-av '+clr+'">'+lbl.slice(0,3)+'</div>'+
    '<div class="pod-name">'+lbl+'</div>'+
    '<div class="pod-pts" style="font-size:10px;color:#8A94B0">'+usr.name+'</div>'+
    '<div class="pod-pts">'+u.pts+'pts</div>'+
    '<div class="pod-bar '+clr+'">'+medal+'</div></div>';
  }
  return'<div class="podium">'+pi(rank[1],"2","82px","silver")+pi(rank[0],"1","110px","gold")+pi(rank[2],"3","58px","bronze")+'</div>';
}

function rankingHTML(){
  function block(p,label,ic){
    var rank=getRank(p);
    return'<div class="card"><div class="card-title">'+ic+' '+label+'</div>'+podiumHTML(rank)+
    '<table class="rtable"><thead><tr><th>#</th><th>Planejador</th><th>Pts</th></tr></thead><tbody>'+
    rank.map(function(u,i){return'<tr><td class="r-pos '+(i===0?"t1":i===1?"t2":i===2?"t3":"tx")+'">'+(i+1)+'</td><td class="r-name">'+u.name+'</td><td class="r-pts">'+u.pts+'</td></tr>';}).join("")+
    '</tbody></table></div>';
  }
  return'<div class="page-title">RANKING <span>GERAL</span></div><div class="page-sub">Classificação por período</div>'+
  '<div class="g3">'+block("week","Semanal","🏆")+block("month","Mensal","📅")+block("year","Anual","📊")+'</div>';
}

function filterAudit(){
  var fu=document.getElementById("af-u").value,fd=document.getElementById("af-d").value;
  document.querySelectorAll("#audit-list .audit-item").forEach(function(el){
    el.style.display=(!fu||el.dataset.uid===fu)&&(!fd||el.dataset.did===fd)?"block":"none";
  });
}

// ── UPLOAD MODAL ──
function openUpload(did,rej){
  curDid=did;
  var d=DMAP[did];
  document.getElementById("modal-title").textContent=d.name.toUpperCase();
  document.getElementById("modal-desc").textContent="Anexe a evidência para registrar +"+d.pts+"pts automaticamente.";
  document.getElementById("rej-note").style.display=rej?"block":"none";
  document.getElementById("upload-prev").classList.remove("show");
  document.getElementById("file-input").value="";
  document.getElementById("upload-modal").classList.add("open");
}
function closeUpload(){document.getElementById("upload-modal").classList.remove("open");curDid=null;}
function onFileSelect(e){
  var f=e.target.files[0];if(!f)return;
  document.getElementById("file-name").textContent=f.name;
  document.getElementById("upload-prev").classList.add("show");
}

async function confirmDelivery(){
  var f=document.getElementById("file-input").files[0];
  if(!f){toast("Anexe um arquivo!","error");return;}
  var btn=document.getElementById("btn-confirm");
  btn.disabled=true;btn.textContent="Enviando...";

  try {
    var d=DMAP[curDid];
    var uid=CU;
    var now=new Date();
    var wk="semana-"+getWeekNum(now);
    var path=now.getFullYear()+"/"+wk+"/"+uid+"/"+Date.now()+"_"+f.name.replace(/[^a-zA-Z0-9._-]/g,"_");

    // Upload para Supabase Storage
    var upRes = await sb.storage.from("evidencias").upload(path, f, {upsert:true});
    if(upRes.error){toast("Erro no upload: "+upRes.error.message,"error");btn.disabled=false;btn.textContent="CONFIRMAR";return;}

    // Remove registro rejeitado anterior
    await sb.from("registros").delete().eq("usuario_id",uid).eq("entrega_id",curDid).eq("status","rejected");

    // Remove registro existente ok (reenvio)
    await sb.from("registros").delete().eq("usuario_id",uid).eq("entrega_id",curDid);

    // Insere novo registro
    var recId=uid+"_"+curDid+"_"+Date.now();
    var insRes = await sb.from("registros").insert({
      id:recId, usuario_id:uid, entrega_id:curDid,
      pontos:d.pts, data:now.toISOString(),
      arquivo_nome:f.name, arquivo_path:path, status:"ok"
    });
    if(insRes.error){toast("Erro ao salvar: "+insRes.error.message,"error");btn.disabled=false;btn.textContent="CONFIRMAR";return;}

    await loadRecs();
    closeUpload();
    toast("🎉 +"+d.pts+"pts registrados!");
    renderApp();
    document.querySelectorAll(".nav-btn")[1].click();
  } catch(e){
    toast("Erro: "+e.message,"error");
  }
  btn.disabled=false;btn.textContent="CONFIRMAR";
}

function getWeekNum(d){var s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7);}

// ── AUDIT MODAL ──
function openAudit(uid,rid,name,file,person,url){
  curAud={uid:uid,rid:rid};
  document.getElementById("am-title").textContent=name;
  document.getElementById("am-who").textContent="👷 "+person;
  document.getElementById("am-file").textContent=file;
  document.getElementById("am-link").href=url;
  document.getElementById("audit-modal").classList.add("open");
}
function closeAudit(){document.getElementById("audit-modal").classList.remove("open");curAud=null;}

async function confirmReject(){
  if(!curAud)return;
  var res = await sb.from("registros").update({status:"rejected"}).eq("id",curAud.rid);
  if(res.error){toast("Erro: "+res.error.message,"error");return;}
  await loadRecs();
  closeAudit();
  toast("⚠️ Evidência reprovada. Planejador deverá reenviar.","error");
  renderCoord();
  var active=document.querySelector(".nav-btn.active");
  var idx=active?Array.from(document.querySelectorAll(".nav-btn")).indexOf(active):0;
  showTab(idx,active);
}
</script>
